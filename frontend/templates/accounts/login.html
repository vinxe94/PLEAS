{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PLEAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="brand-icon">
                    <i class="bi bi-cpu"></i>
                </div>
                <h2>Welcome Back</h2>
                <p class="text-muted">Sign in to PLEAS System</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger py-2">
                <small><i class="bi bi-exclamation-triangle"></i> Invalid username or password.</small>
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted mb-0">Don't have an account?
                    <a href="{% url 'register' %}" class="text-decoration-none fw-medium">Register</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
